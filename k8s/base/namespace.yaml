apiVersion: v1
kind: Namespace
metadata:
  name: cloud-platform
  labels:
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cloud-platform-quota
  namespace: cloud-platform
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
    services: "10"
